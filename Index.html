<style>
  :root {
    --black: #050505;
    --surface: #0a0a0a;
    --surface2: #111111;
    --surface3: #191919;
    --border: #222222;
    --border2: #2e2a1e;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6530;
    --gold-glow: rgba(201,168,76,0.12);
    --text: #f0ead8;
    --muted: #6b6555;
    --dim: #332e22;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }
  .cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s;
  }
  .cursor-ring {
    position: fixed;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, opacity 0.3s;
  }
  .cursor.hovering { width: 14px; height: 14px; }
  .cursor-ring.hovering { width: 48px; height: 48px; opacity: 0.5; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9997;
    opacity: 0.5;
  }
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold-light) 50%, var(--gold) 70%, transparent 100%);
    z-index: 200;
  }
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 68px;
    border-bottom: 1px solid var(--border);
    background: rgba(5,5,5,0.95);
    backdrop-filter: blur(16px);
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 0.14em;
    color: var(--text);
    text-decoration: none;
  }
  .nav-logo .gold-letter { color: var(--gold); text-shadow: 0 0 20px rgba(201,168,76,0.4); }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.25s;
  }
  .nav-links a:hover { color: var(--gold-light); }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-search {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 9px 18px;
    width: 230px;
    transition: border-color 0.25s;
  }
  .nav-search:focus-within { border-color: var(--gold-dim); }
  .nav-search input {
    background: none; border: none; outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    width: 100%;
  }
  .nav-search input::placeholder { color: var(--muted); }
  .search-icon { color: var(--gold-dim); font-size: 15px; }
  .nav-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold-dim);
    padding: 10px 22px;
    cursor: none;
    transition: background 0.25s, color 0.25s;
  }
  .nav-btn:hover { background: var(--gold-glow); color: var(--gold-light); }

    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }

    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-left {
    padding: 100px 60px 80px;
    display: flex;

    justify-content: center;

  }

    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .hero-tag::before { content: ''; display: block; width: 36px; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }

    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 9vw, 124px);
    line-height: 0.88;
    letter-spacing: 0.03em;
    margin-bottom: 36px;
  }
  .hero-title .gold-word { color: var(--gold); text-shadow: 0 0 40px rgba(201,168,76,0.25); }
